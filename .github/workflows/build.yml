name: Build C++ Project

on:
  push:
    branches:
      - 'main'  # Ejecutar en cada push

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install MinGW (g++)
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH

      - name: Set up SFML
        run: |
          mkdir C:\SFML
          xcopy /E /I SFML\* C:\SFML

      - name: Create build subdirectories
        run: |
          if (!(Test-Path -Path "build")) { New-Item -ItemType Directory -Path "build" }
          if (!(Test-Path -Path "build/enemies")) { New-Item -ItemType Directory -Path "build/enemies" }

      - name: Build project with make
        run: make

      - name: Prepare dist folder
        shell: cmd
        run: |
          mkdir dist
          copy build\Castlevania.exe dist\
          for %%f in (build\*.dll) do copy %%f dist\
          xcopy /E /I assets dist\assets\
          copy config.json dist\

      - name: Create ZIP of dist folder
        run: Compress-Archive -Path dist\* -DestinationPath Castlevania.zip

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Castlevania
          path: Castlevania.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Castlevania
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Castlevania Release ${{ github.run_number }}
          files: Castlevania.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
